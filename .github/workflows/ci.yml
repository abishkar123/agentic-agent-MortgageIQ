name: MortgageIQ Agents CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run typecheck

  agent-eval:
    name: Agent eval harness
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - run: npm ci

      - name: Restore HNSWLib vector store
        uses: actions/cache@v4
        with:
          path: ../mortgageiq-ts/hnswlib_db
          key: hnswlib-v1

      - name: Run agent eval harness
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_PROJECT: mortgageiq-agents-ci
        run: npm run eval

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: agent-eval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
